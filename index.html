<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Security Diagnostic</title>
    <style>
        body { background: black; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Il finto pop-up */
        #popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 270px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            color: black;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .btn { color: #007AFF; font-weight: bold; margin-top: 15px; cursor: pointer; border-top: 0.5px solid #bdc3c7; padding-top: 10px; }
        
        .spinner { border: 3px solid #333; border-top: 3px solid #00FF00; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <h2 style="color: #00FF00;">ANALISI KERNEL...</h2>
        <div class="spinner"></div>
        <p>Accesso ai dati cifrati...</p>
    </div>

    <div id="popup">
        <b style="font-size: 17px;">Vulnerabilità Rilevata</b><br>
        <p style="font-size: 13px; margin-top: 5px;">Il database Secure Enclave è stato esposto. Codice di sblocco trovato: <br><br> <span style="font-size: 20px; font-weight: bold; letter-spacing: 5px;">258036</span></p>
    </div>

    <script>
        // Mostra il finto pop-up dopo 3 secondi
        setTimeout(function() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('popup').style.display = 'block';
        }, 3000);
    </script>
</body>
</html>
